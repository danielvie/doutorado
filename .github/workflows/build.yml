name: Build and Release Cross-Platform Executables

# Trigger the workflow only on tagged pushes
on:
  push:
    tags:
      - 'web-v*'  # Triggers on tags like web-v1.0.0, web-v2.0.0, etc.

permissions:
  contents: write  # Grant write access to repository contents

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            extension: .exe
            suffix: windows-amd64
          - goos: darwin
            goarch: arm64
            extension: ""
            suffix: macos-arm64

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4


      # Step 2: Set up Bun environment
      - name: Set up Node.js
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          cd embedded/esp32/web
          bun install

      # Step 4: Build React App
      - name: Build react app
        run: |
          cd embedded/esp32/web
          bun run build

      # Step 5: Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      # Step 6: Build cross-platform executables
      - name: Build Executable for ${{ matrix.suffix }}
        run: |
          cd embedded/esp32/web
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o web_server_daniel${{ matrix.extension }} ./go_server/server.go
          mv web_server_daniel${{ matrix.extension }} web_server_daniel-${{ matrix.suffix }}${{ matrix.extension }}

      # Step 7: Upload the executable as an artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web_server_daniel-${{ matrix.suffix }}
          path: embedded/esp32/web/web_server_daniel-${{ matrix.suffix }}${{ matrix.extension }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Download all artifacts
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      # Step 3: Display downloaded artifacts structure (for debugging)
      - name: Display structure of downloaded files
        run: ls -la ./artifacts/

      # Step 4: Create a GitHub Release with all executables
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/web_server_daniel-windows-amd64/web_server_daniel-windows-amd64.exe
            ./artifacts/web_server_daniel-macos-arm64/web_server_daniel-macos-arm64