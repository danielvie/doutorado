version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  run:
    desc: Open the generated overview documentation
    cmds:
      - pwsh -NoProfile -Command "Start-Process '{{.TASKFILE_DIR}}/docs/latex-overview.html'; Start-Process '{{.TASKFILE_DIR}}/docs/simu2-overview.html'; Start-Process '{{.TASKFILE_DIR}}/docs/embedded-overview.html'"

  test:
    desc: Validate generated overview documentation files
    cmds:
      - pwsh -NoProfile -File scripts/validate-overview-docs.ps1

  clean:
    desc: Remove generated overview documentation
    cmds:
      - pwsh -NoProfile -Command "Remove-Item -Force docs/latex-overview.html,docs/simu2-overview.html,docs/embedded-overview.html -ErrorAction SilentlyContinue"

  update-tese:
    desc: Copy LATEX/Tese/build/tese.pdf to the project folder
    cmds:
      - cp LATEX/Tese/build/tese.pdf ./