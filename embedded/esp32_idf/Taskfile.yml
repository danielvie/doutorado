# Taskfile.yml - ESP-IDF Project Tasks (Cross-Platform)
# Requires Task: https://taskfile.dev
#
# Supports: Windows, macOS, Linux

version: "3"

vars:
  PROJECT_DIR: "{{.TASKFILE_DIR}}"

  # OS Detection: windows, darwin (macOS), linux
  OS: "{{OS}}"

  # Windows paths and settings
  IDF_PATH_WIN: "C:/Users/daniel/esp/v5.5.1/esp-idf"
  PYTHON_ENV_WIN: "C:/Users/daniel/.espressif/python_env/idf5.5_py3.13_env"
  TOOLS_PATH_WIN: "C:/Users/daniel/.espressif"
  PORT_WIN: "COM3"

  # macOS/Linux paths and settings
  IDF_PATH_UNIX: "/Users/danielvieira/esp/v5.5.1/esp-idf"
  PYTHON_ENV_UNIX: "/Users/danielvieira/.espressif/python_env/idf5.5_py3.12_env"
  TOOLS_PATH_UNIX: "/Users/danielvieira/.espressif"
  PORT_UNIX: "/dev/tty.usbserial-0001"

  # Select paths based on OS
  IDF_PATH: '{{if eq .OS "windows"}}{{.IDF_PATH_WIN}}{{else}}{{.IDF_PATH_UNIX}}{{end}}'
  PYTHON_ENV: '{{if eq .OS "windows"}}{{.PYTHON_ENV_WIN}}{{else}}{{.PYTHON_ENV_UNIX}}{{end}}'
  TOOLS_PATH: '{{if eq .OS "windows"}}{{.TOOLS_PATH_WIN}}{{else}}{{.TOOLS_PATH_UNIX}}{{end}}'
  PORT: '{{if eq .OS "windows"}}{{.PORT_WIN}}{{else}}{{.PORT_UNIX}}{{end}}'

  # Script selection based on OS
  SCRIPT_EXT: '{{if eq .OS "windows"}}ps1{{else}}sh{{end}}'
  IDF_RUN_SCRIPT: "{{.PROJECT_DIR}}/idf_run.{{.SCRIPT_EXT}}"

  # Interpreter based on OS
  INTERPRETER: '{{if eq .OS "windows"}}powershell -NoProfile -ExecutionPolicy Bypass -File{{else}}bash{{end}}'

env:
  IDF_PATH: "{{.IDF_PATH}}"
  IDF_TOOLS_PATH: "{{.TOOLS_PATH}}"
  ESPPORT: "{{.PORT}}"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  info:
    desc: Show OS detection and configuration info
    cmds:
      - 'echo "Operating System: {{.OS}}"'
      - 'echo "IDF_PATH: {{.IDF_PATH}}"'
      - 'echo "TOOLS_PATH: {{.TOOLS_PATH}}"'
      - 'echo "PORT: {{.PORT}}"'
      - 'echo "Script: {{.IDF_RUN_SCRIPT}}"'
      - 'echo "Interpreter: {{.INTERPRETER}}"'

  build:
    desc: Build the project
    cmds:
      - '{{.INTERPRETER}} "{{.IDF_RUN_SCRIPT}}" build'

  build:cpp:
    desc: Build the project
    cmds:
      - task: build

  build:all:
    desc: Build the project
    deps: [proto:gen]
    cmds:
      - task: build

  build:proto:
    desc: Build the protofile
    cmds:
      - task: proto:gen

  flash:
    desc: Flash the project to the target
    cmds:
      - '{{.INTERPRETER}} "{{.IDF_RUN_SCRIPT}}" flash'

  monitor:
    desc: Monitor the serial output
    cmds:
      - '{{.INTERPRETER}} "{{.IDF_RUN_SCRIPT}}" monitor'

  flash-monitor:
    desc: Flash and then monitor
    cmds:
      - '{{.INTERPRETER}} "{{.IDF_RUN_SCRIPT}}" flash monitor'

  build-flash:
    desc: Build, flash, and monitor (full workflow)
    cmds:
      - '{{.INTERPRETER}} "{{.IDF_RUN_SCRIPT}}" build flash'

  build-flash-monitor:
    desc: Build, flash, and monitor (full workflow)
    cmds:
      - '{{.INTERPRETER}} "{{.IDF_RUN_SCRIPT}}" build flash monitor'

  menuconfig:
    desc: Open menuconfig
    cmds:
      - '{{.INTERPRETER}} "{{.IDF_RUN_SCRIPT}}" menuconfig'

  clean:
    desc: Clean the build directory
    cmds:
      - '{{.INTERPRETER}} "{{.IDF_RUN_SCRIPT}}" fullclean'

  reconfigure:
    desc: Re-run CMake configuration
    cmds:
      - '{{.INTERPRETER}} "{{.IDF_RUN_SCRIPT}}" reconfigure'

  erase-flash:
    desc: Erase the entire flash
    cmds:
      - '{{.INTERPRETER}} "{{.IDF_RUN_SCRIPT}}" erase-flash'

  gdb:
    desc: Start GDB for debugging
    cmds:
      - '{{.INTERPRETER}} "{{.IDF_RUN_SCRIPT}}" gdb'

  gdbgui:
    desc: Start GDB GUI
    cmds:
      - '{{.INTERPRETER}} "{{.IDF_RUN_SCRIPT}}" gdbgui'

  flash-auto:
    desc: Flash with auto-detected port (clears ESPPORT)
    env:
      ESPPORT: ""
    cmds:
      - '{{.INTERPRETER}} "{{.IDF_RUN_SCRIPT}}" flash'

  monitor-auto:
    desc: Monitor with auto-detected port (clears ESPPORT)
    env:
      ESPPORT: ""
    cmds:
      - '{{.INTERPRETER}} "{{.IDF_RUN_SCRIPT}}" monitor'

  flash-monitor-auto:
    desc: Flash then monitor with auto-detected port
    aliases: [fma]
    env:
      ESPPORT: ""
    cmds:
      - '{{.INTERPRETER}} "{{.IDF_RUN_SCRIPT}}" flash monitor'

  build-flash-monitor-auto:
    desc: Build, flash, and monitor with auto-detected port
    aliases: [bfma]
    env:
      ESPPORT: ""
    cmds:
      - '{{.INTERPRETER}} "{{.IDF_RUN_SCRIPT}}" build flash monitor'

  bf:
    desc: Build and flash (shortcut)
    cmds:
      - task: build-flash

  fm:
    desc: Flash and monitor (shortcut)
    cmds:
      - task: flash-monitor

  bfm:
    desc: Build, flash, and monitor (shortcut)
    cmds:
      - task: build-flash-monitor

  ports:
    desc: List available serial ports
    cmds:
      - '{{if eq .OS "windows"}}{{.PYTHON_ENV_WIN}}/Scripts/python{{else}}{{.PYTHON_ENV_UNIX}}/bin/python{{end}} -m serial.tools.list_ports'

  web:install:
    desc: install webserver dependencies
    dir: web
    cmds:
      - bun install

  web:agentation:
    desc: run agentation server
    dir: web
    cmds:
      - task agentation

  web:build:
    desc: build webserver
    dir: web
    cmds:
      - task build

  web:run:
    desc: run webserver
    dir: web
    cmds:
      - task run

  web:all:
    desc: run webserver + agentation server
    deps: [web:run, web:agentation]

  clang:setup:
    desc: Setup clangd and Zed configuration for current OS
    cmds:
      - >
        {{if eq .OS "windows"}}
          powershell -NoProfile -ExecutionPolicy Bypass -Command "Copy-Item -Path '.clangd.d/windows.yaml' -Destination '.clangd' -Force; Copy-Item -Path '.zed.d/settings-windows.json' -Destination '.zed/settings.json' -Force"
        {{else}}
          bash -c "cp .clangd.d/macos.yaml .clangd && cp .zed.d/settings-macos.json .zed/settings.json"
        {{end}}
      - 'echo "✓ Configuration complete. Reload Zed to apply changes."'

  proto:gen:firmware:
    desc: Generate C files for Nanopb
    cmds:
      - 'echo "Generating Nanopb files..."'
      - >
        {{if eq .OS "windows"}}
        powershell -NoProfile -ExecutionPolicy Bypass -Command "& { . {{.IDF_PATH_WIN}}/export.ps1; nanopb_generator -D main/src proto/messaging.proto }"
        {{else}}
        bash -c "export IDF_PYTHON_ENV_PATH={{.PYTHON_ENV_UNIX}} && . {{.IDF_PATH_UNIX}}/export.sh && nanopb_generator -D main/src proto/messaging.proto"
        {{end}}

  proto:gen:web:
    desc: Generate JS/TS files for protobufjs
    dir: web
    cmds:
      - 'echo "Generating Protobuf JS files..."'
      - "npx pbjs -t static-module -w es6 -o src/proto/messaging.js ../proto/messaging.proto"
      - "npx pbts -o src/proto/messaging.d.ts src/proto/messaging.js"

  proto:gen:
    desc: Generate all proto files
    cmds:
      - task: proto:gen:firmware
      - task: proto:gen:web
