syntax = "proto3";

enum BleSignalSet {
    BLE_SET_A = 0;
    BLE_SET_B = 1;
}

enum BleAnalogReadState {
    BLE_READ_IDLE = 0;
    BLE_READING = 1;
    BLE_READ_DISABLED = 2;
}

enum BleSignalState {
    BLE_SIG_IDLE = 0;
    BLE_SIG_RUNNING = 1;
}

enum BleControlState {
    BLE_CTRL_OFF = 0;
    BLE_CTRL_ON = 1;
}

enum BleLedMode {
    LED_NORMAL = 0;
    LED_BLINKING = 1;
}

enum BleLogLevel {
    BLE_LOG_INFO = 0;
    BLE_LOG_WARN = 1;
    BLE_LOG_ERROR = 2;
}

// Telemetry message containing analog port readings
message Telemetry {
    float an3 = 1;
    float an5 = 2;
    float an6 = 3;
    uint32 timestamp_ms = 4;
}

message AnalogStatus {
    uint32 seq = 1;
    bool valid = 2;
    uint64 timestamp_us = 3;
    uint32 age_us = 4;
    uint32 target_triples_per_cycle = 5;
    uint32 measured_triples_per_second = 6;
    uint32 raw_an3 = 7;
    uint32 raw_an5 = 8;
    uint32 raw_an6 = 9;
    float calibrated_an3 = 10;
    float calibrated_an5 = 11;
    float calibrated_an6 = 12;
    uint32 latency_min_us = 13;
    uint32 latency_avg_us = 14;
    uint32 latency_p95_us = 15;
    uint32 latency_max_us = 16;
    uint32 overflow_count = 17;
    uint32 miss_count = 18;
    uint32 consecutive_misses = 19;
    uint32 fault_code = 20;
    uint32 acquisition_mode = 21;
    uint32 samples_read = 22;
    uint32 samples_rejected = 23;
    uint32 channel_order_anomalies = 24;
    uint32 partial_triples = 25;
    uint32 frame_drops = 26;
    uint32 pool_flushes = 27;
    bool calibration_lut_ready = 28;
}

// System status message
message SystemStatus {
    BleSignalSet active_set = 1;
    BleSignalState signal_state = 2;
    BleAnalogReadState ble_read_state = 3;
    BleControlState control_state = 4;
    
    float alpha = 5; 
    bool has_alpha = 6;
    
    bool matrix_a_valid = 7;
    bool matrix_b_valid = 8;
    
    uint32 current_cycles = 9;
    uint32 total_cycles = 10;
    
    uint32 monitor_ms = 11;
    uint32 dead_time_us = 12;
    BleLedMode led_mode = 14;
    bool ble_congested = 15;
    uint32 adc_min = 16;
    uint32 adc_max = 17;
    uint32 adc_avg = 18;
    uint32 dead_time_tail_overhead_cycles = 19;
    AnalogStatus analog = 20;
}

// General purpose log message
message LogMessage {
    BleLogLevel level = 1;
    string text = 2;
}

// OTA Communication
enum OtaState {
    OTA_IDLE = 0;
    OTA_DOWNLOADING = 1;
    OTA_VERIFYING = 2;
    OTA_FINISHED = 3;
    OTA_ERROR = 4;
}

message OtaStatus {
    OtaState state = 1;
    uint32 progress_percent = 2;
    string message = 3;
    uint32 written_size = 4;
    uint32 expected_seq = 5;
}

message OtaBegin {
    uint32 file_size = 1;
}

message OtaChunk {
    uint32 seq = 1;
    bytes data = 2;
}

message OtaEnd {
    string sha256 = 1;
}

message OtaCommand {
    oneof type {
        OtaBegin begin = 1;
        OtaChunk chunk = 2;
        OtaEnd end = 3;
        bool abort = 4;
    }
}

// Extensible UI command envelope.
// The command name is namespaced (for example "signal.start") and the payload
// is command-owned JSON so new lab commands can be added without changing this
// schema every time.
message UiCommand {
    string name = 1;
    string json = 2;
    uint32 request_id = 3;
}

message UiCommandResult {
    uint32 request_id = 1;
    string name = 2;
    bool ok = 3;
    string code = 4;
    string message = 5;
    string json = 6;
}

message AnalogDiagnosticResult {
    bool valid = 1;
    bool running = 2;
    uint32 duration_ms = 3;
    uint64 elapsed_us = 4;
    uint32 seq_delta = 5;
    uint32 miss_delta = 6;
    uint32 overflow_delta = 7;
    uint32 seq = 8;
    uint32 age_us = 9;
    uint32 rate_tps = 10;
    uint32 raw_an3 = 11;
    uint32 raw_an5 = 12;
    uint32 raw_an6 = 13;
    float cal_an3 = 14;
    float cal_an5 = 15;
    float cal_an6 = 16;
    uint32 latency_avg_us = 17;
    uint32 latency_p95_us = 18;
    uint32 fault_code = 19;
    uint32 timing_samples = 20;
    float playback_avg_us = 21;
    float loop_us = 22;
    uint32 overruns = 23;
    uint32 timing_faults = 24;
    string message = 25;
}

// Top-level message for BLE communication
message BlePacket {
    oneof payload {
        Telemetry telemetry = 1;
        SystemStatus status = 2;
        LogMessage log = 3;
        OtaStatus ota_status = 4;
        UiCommandResult command_result = 5;
        AnalogDiagnosticResult analog_diagnostic_result = 6;
    }
}
