syntax = "proto3";

enum BleSignalSet {
    BLE_SET_A = 0;
    BLE_SET_B = 1;
}

enum BleAnalogReadState {
    BLE_READ_IDLE = 0;
    BLE_READING = 1;
    BLE_READ_DISABLED = 2;
}

enum BleSignalState {
    BLE_SIG_IDLE = 0;
    BLE_SIG_RUNNING = 1;
}

enum BleControlState {
    BLE_CTRL_OFF = 0;
    BLE_CTRL_ON = 1;
}

enum BleLedMode {
    LED_NORMAL = 0;
    LED_BLINKING = 1;
}

enum BleLogLevel {
    BLE_LOG_INFO = 0;
    BLE_LOG_WARN = 1;
    BLE_LOG_ERROR = 2;
}

// Telemetry message containing analog port readings
message Telemetry {
    float an3 = 1;
    float an5 = 2;
    float an6 = 3;
    uint32 timestamp_ms = 4;
}

// System status message
message SystemStatus {
    BleSignalSet active_set = 1;
    BleSignalState signal_state = 2;
    BleAnalogReadState ble_read_state = 3;
    BleControlState control_state = 4;
    
    float alpha = 5; 
    bool has_alpha = 6;
    
    bool matrix_a_valid = 7;
    bool matrix_b_valid = 8;
    
    uint32 current_cycles = 9;
    uint32 total_cycles = 10;
    
    uint32 monitor_ms = 11;
    uint32 dead_time_us = 12;
    BleLedMode led_mode = 14;
    bool ble_congested = 15;
    uint32 adc_min = 16;
    uint32 adc_max = 17;
    uint32 adc_avg = 18;
    uint32 dead_time_tail_overhead_cycles = 19;
}

// General purpose log message
message LogMessage {
    BleLogLevel level = 1;
    string text = 2;
}

// OTA Communication
enum OtaState {
    OTA_IDLE = 0;
    OTA_DOWNLOADING = 1;
    OTA_VERIFYING = 2;
    OTA_FINISHED = 3;
    OTA_ERROR = 4;
}

message OtaStatus {
    OtaState state = 1;
    uint32 progress_percent = 2;
    string message = 3;
    uint32 written_size = 4;
    uint32 expected_seq = 5;
}

message OtaBegin {
    uint32 file_size = 1;
}

message OtaChunk {
    uint32 seq = 1;
    bytes data = 2;
}

message OtaEnd {
    string sha256 = 1;
}

message OtaCommand {
    oneof type {
        OtaBegin begin = 1;
        OtaChunk chunk = 2;
        OtaEnd end = 3;
        bool abort = 4;
    }
}

// Extensible UI command envelope.
// The command name is namespaced (for example "signal.start") and the payload
// is command-owned JSON so new lab commands can be added without changing this
// schema every time.
message UiCommand {
    string name = 1;
    string json = 2;
    uint32 request_id = 3;
}

message UiCommandResult {
    uint32 request_id = 1;
    string name = 2;
    bool ok = 3;
    string code = 4;
    string message = 5;
    string json = 6;
}

// Top-level message for BLE communication
message BlePacket {
    oneof payload {
        Telemetry telemetry = 1;
        SystemStatus status = 2;
        LogMessage log = 3;
        OtaStatus ota_status = 4;
        UiCommandResult command_result = 5;
    }
}
