<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Web Bluetooth Control</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>ESP32 Web Bluetooth Control</h1>
    
    <button id="connectBtn">Connect to ESP32</button>
    <button id="disconnectBtn">Disconnect</button>
    <button id="btn-receive">receive</button>
    
    <!-- <div id="controlPanel" style="display: none;"> -->
    <div id="controlPanel">
        <div class="grid-24 justify-content">
            <input type="text" id="commandInput" class="col-span-20" placeholder="Enter command">
            <button id="sendBtn" class="col-span-4 justify-content mx-0" style="margin-left: 0.8em;">send</button>
        </div>

        <div class="grid-24 mb-8">
            <label for="" class="col-span-3 flex item-center justify-content mr-4">an2</label>
            <div type="text" id="div-an2" class="col-span-4 analog-read"> -9.999</div>
            <label for="" class="col-span-3 flex item-center justify-content mr-4">an3</label>
            <div type="text" id="div-an3" class="col-span-4 analog-read"> -9.999</div>
            <span class="col-span-10"></span>
            <label for="" class="col-span-3 flex item-center justify-content mr-4">an4</label>
            <div type="text" id="div-an4" class="col-span-4 analog-read"> -9.999</div>
            <label for="" class="col-span-3 flex item-center justify-content mr-4">an5</label>
            <div type="text" id="div-an5" class="col-span-4 analog-read"> -9.999</div>
            <label for="" class="col-span-3 flex item-center justify-content mr-4">an6</label>
            <div type="text" id="div-an6" class="col-span-4 analog-read"> -9.999</div>
            <span class="col-span-3"></span>
        </div>

        <div class="grid-24">
            <label for="" class="col-span-3 flex item-center justify-content mr-4">alpha:</label>
            <input type="text" id="in-alpha" class="col-span-2" value="0.5">
            <label for="" class="col-span-1"></label>
            <button type="text" id="btn-alpha" class="col-span-4" placeholder="Enter time">calc</button>
        </div>
        <div class="grid-24">
            <label for="" class="col-span-3 flex item-center justify-content mr-4">time:</label>
            <input type="text" id="in-time" class="col-span-21" placeholder="Enter time">
        </div>
        <div class="grid-24">
            <label for="" class="col-span-3 flex item-center justify-content mr-4">modes:</label>
            <input type="text" id="in-mode" class="col-span-21" placeholder="Enter modes">
        </div>
        <div class="grid-24 mb-4">
            <label for="" class="col-span-3 flex item-center justify-content mr-4">X*time:</label>
            <input type="text" id="in-mul" class="col-span-3" placeholder="X*time" value="1.0">
            <span class="col-span-2"></span>
            <button id="btn-div10" class="col-span-4">x1/10</button>
            <button id="btn-mul10" class="col-span-4">x10</button>
            <button id="btn-signal-calc" class="col-span-4">calc</button>
            <button id="btn-signal-send" class="col-span-4">send</button>
        </div>
        
        <div class="bar mb-10"></div>

        <button id="btn-signal-1">signal 1</button>
        <button id="btn-signal-2">signal 2</button>

        <button id="btn-start">start</button>
        <button id="btn-stop">stop</button>
        <button id="btn-high">high</button>
    </div>
    
    <div id="status"></div>
    
    <div id="analog-an4" class="hidden"></div>
    <div id="analog-an5" class="hidden"></div>
    <div id="analog-an6" class="hidden"></div>
    <button id="btn-copy-values">copy values</button>

    <script src="app.js"></script>
</body>
</html>
